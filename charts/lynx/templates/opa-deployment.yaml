{{- if .Values.opa.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-opa
  labels:
    app: {{ .Chart.Name }}-opa
spec:
  replicas: {{ .Values.opa.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-opa
      instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-opa
        instance: {{ .Release.Name }}
    spec:
      containers:
        - name: opa
          image: "{{ .Values.opa.image.repository }}:{{ .Values.opa.image.tag }}"
          imagePullPolicy: {{ .Values.opa.image.pullPolicy }}
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--config-file=/config/config.yaml"
          ports:
            - name: http
              containerPort: 8181
          env:
            - name: OPA_BUNDLE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.opa.token.existingSecret }}{{ .Values.opa.token.existingSecret }}{{ else }}{{ .Release.Name }}-opa-token{{ end }}
                  key: token
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health?bundles
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.opa.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-opa-config
{{- end -}}

{{- if and .Values.opa.enabled .Values.opa.token.autoGenerate (not .Values.opa.token.existingSecret) -}}
{{- $secretName := printf "%s-opa-token" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $token := "" -}}
{{- if $existing -}}
{{- $token = (index $existing.data "token") | b64dec -}}
{{- else -}}
{{- $token = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: {{ .Chart.Name }}
type: Opaque
data:
  token: {{ $token | b64enc }}
{{- end -}}

name: Test OIDC Backend Auth

on:
  push:
    branches:
      - '**'

permissions:
  id-token: write
  contents: read

env:
  LYNX_URL: https://neoma-unaccepted-verisimilarly.ngrok-free.dev
  PROVIDER_NAME: github-actions
  TEAM_SLUG: test-team
  PROJECT_SLUG: test-project
  ENV_SLUG: test-env

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token
        id: token
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=lynx" | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Decode token claims (for debugging)
        run: |
          echo "${{ steps.token.outputs.token }}" | cut -d. -f2 | base64 -d 2>/dev/null | jq . || true

      - name: Test state GET with OIDC
        run: |
          echo "Testing: GET $LYNX_URL/client/$TEAM_SLUG/$PROJECT_SLUG/$ENV_SLUG/state"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "$PROVIDER_NAME:${{ steps.token.outputs.token }}" \
            "$LYNX_URL/client/$TEAM_SLUG/$PROJECT_SLUG/$ENV_SLUG/state")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Access denied (403). Check OIDC provider config and access rules."
            exit 1
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "::error::Unauthorized (401). Token or provider issue."
            exit 1
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::notice::State not found (expected for new environments). Auth succeeded!"
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "::notice::Access granted! State retrieved successfully."
          fi

      - name: Test with wrong provider (should fail)
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "nonexistent-provider:${{ steps.token.outputs.token }}" \
            "$LYNX_URL/client/$TEAM_SLUG/$PROJECT_SLUG/$ENV_SLUG/state")

          echo "Wrong provider HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "::notice::Correctly rejected wrong provider name."
          else
            echo "::warning::Expected 401/403 for wrong provider, got $HTTP_CODE"
          fi

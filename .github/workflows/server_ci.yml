name: Server CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '28.4.2'
            elixir: '1.19.5'
    services:
      db:
        image: postgres:latest
        ports: ['5432:5432']
        env:
          POSTGRES_DB: lynx_dev
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: lynx
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Get Dependencies
        run: make deps

      - name: Check Lynx Format
        run: make fmt_check

      - name: Get Version
        run: make v

      - name: Test Lynx
        run: make ci

      - name: Build Lynx
        run: make build

      # Fails if `api.yml` has drifted from controller `@operation` annotations.
      # Regenerate locally with `mix lynx.openapi.dump` and commit the result.
      - name: Check OpenAPI spec drift
        run: make openapi_check

  # Browser-driven feature tests via PhoenixTest.Playwright. Separate job so
  # the chromium install + asset build don't slow the unit suite. Skipped by
  # the `test` job (the :feature ExUnit tag is excluded by default).
  feature:
    runs-on: ubuntu-latest
    name: Feature tests (Playwright)
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '28.4.2'
            elixir: '1.19.5'
    services:
      db:
        image: postgres:latest
        ports: ['5432:5432']
        env:
          POSTGRES_DB: lynx_dev
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: lynx
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: 'assets/package-lock.json'

      - name: Get Dependencies
        run: make deps

      # Cache the chromium browser binary across runs. Keyed on the playwright
      # JS version pinned in assets/package-lock.json so a bump invalidates.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('assets/package-lock.json') }}

      - name: Install Playwright browsers
        run: make playwright_install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ${{ steps.playwright-cache.outputs.cache-hit == 'true' && '1' || '' }}

      - name: Run feature tests
        run: make feature_test

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-traces
          path: tmp/playwright/
          if-no-files-found: ignore

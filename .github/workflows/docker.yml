name: Publish Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "platform_tag=${PLATFORM_TAG}" >> $GITHUB_OUTPUT
          OWNER="${{ github.repository_owner }}"
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform_tag }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=lynx-${{ steps.vars.outputs.platform_tag }}
          cache-to: type=gha,mode=max,scope=lynx-${{ steps.vars.outputs.platform_tag }}
          provenance: false
          outputs: type=image,push=true,compression=gzip,compression-level=6,force-compression=true
          labels: |
            org.opencontainers.image.title=Lynx
            org.opencontainers.image.description=A Fast, Secure and Reliable Terraform Backend
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Set variables
        id: vars
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push version manifest
        run: |
          docker manifest create \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }} \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}-linux-amd64 \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}-linux-arm64
          docker manifest push ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}

      - name: Create and push latest manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker manifest create \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:latest \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}-linux-amd64 \
            ghcr.io/${{ steps.vars.outputs.owner }}/lynx:${{ steps.vars.outputs.tag }}-linux-arm64
          docker manifest push ghcr.io/${{ steps.vars.outputs.owner }}/lynx:latest

name: Helm Chart Publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Set chart version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' charts/lynx/Chart.yaml | awk '{print $2}')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi
          OWNER="${{ github.repository_owner }}"
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/lynx/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/lynx/Chart.yaml
          cat charts/lynx/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/lynx

      - name: Package Helm chart
        run: |
          helm package charts/lynx --destination ./helm-package
          ls -la ./helm-package

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GitHub Container Registry
        run: |
          CHART_PACKAGE=$(ls ./helm-package/*.tgz)
          helm push "${CHART_PACKAGE}" oci://ghcr.io/${{ steps.version.outputs.owner }}/charts

version: '3.8'

services:
  app:
    image: ghcr.io/muon-space/lynx:latest
    environment:
      APP_NAME: Lynx
      APP_PORT: 4000
      APP_SECRET: koPmu7TJCwD8mttV9vgWUeU7iuu/zTPOR3sX4UalM9KkYEVGPfyi0PeTVzu1TT8C
      APP_HOST: localhost
      APP_HTTP_SCHEMA: http
      DB_USERNAME: root
      DB_PASSWORD: D1q9f0C2&PEW
      DB_HOSTNAME: db
      DB_DATABASE: lynx
      DB_PORT: 5432
      DB_SSL: null
      DB_CA_CERTFILE_PATH: null
      OPA_URL: http://opa:8181
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
      MIX_ENV: prod
    command: sh -c "/app/bin/migrate && /app/bin/server"
    restart: unless-stopped
    ports:
      - '4000:4000'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4000/_health"]
      interval: 30s
      retries: 3
    depends_on:
      - db
      - opa

  db:
    image: postgres:18.3
    environment:
      POSTGRES_DB: lynx
      POSTGRES_USER: root
      POSTGRES_PASSWORD: D1q9f0C2&PEW
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql/data

  opa:
    image: openpolicyagent/opa:latest
    environment:
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--config-file=/config/config.yaml"]
    restart: unless-stopped
    # Exposed on the host for debugging only; lynx talks to opa over the
    # compose network at http://opa:8181.
    ports:
      - '8181:8181'
    volumes:
      - ./opa-config.yaml:/config/config.yaml:ro

volumes:
  db:
    driver: local

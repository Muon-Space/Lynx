---
components:
  responses: {}
  schemas:
    ProjectCreate:
      properties:
        description:
          type: string
        name:
          type: string
        slug:
          type: string
        team_id:
          description: Single team UUID (legacy)
          type: string
        team_ids:
          items:
            description: Team UUID
            type: string
          type: array
      required:
        - name
        - slug
        - description
      title: ProjectCreate
      type: object
    OIDCProviderList:
      properties:
        providers:
          items:
            $ref: '#/components/schemas/OIDCProvider'
          type: array
      title: OIDCProviderList
      type: object
    OIDCProvider:
      properties:
        audience:
          type: string
        createdAt:
          format: date-time
          type: string
        discoveryUrl:
          type: string
        id:
          description: UUID
          type: string
        isActive:
          type: boolean
        name:
          type: string
        successMessage:
          description: Present on create/update
          type: string
      title: OIDCProvider
      type: object
    UserList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        users:
          items:
            $ref: '#/components/schemas/User'
          type: array
      title: UserList
      type: object
    Environment:
      properties:
        createdAt:
          format: date-time
          type: string
        id:
          description: UUID
          type: string
        isLocked:
          type: boolean
        name:
          type: string
        project:
          $ref: '#/components/schemas/EnvironmentProjectRef'
        secret:
          description: Static credential for legacy auth
          type: string
        slug:
          type: string
        stateVersion:
          type: integer
        updatedAt:
          format: date-time
          type: string
        username:
          type: string
      title: Environment
      type: object
    ScimTokenCreate:
      properties:
        description:
          type: string
      title: ScimTokenCreate
      type: object
    ProfileUpdate:
      properties:
        email:
          format: email
          type: string
        name:
          type: string
        password:
          type: string
      title: ProfileUpdate
      type: object
    AuditEventList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        events:
          items:
            $ref: '#/components/schemas/AuditEvent'
          type: array
      title: AuditEventList
      type: object
    SamlCertResponse:
      properties:
        cert_pem:
          type: string
        successMessage:
          type: string
      title: SamlCertResponse
      type: object
    OIDCRule:
      properties:
        claimRules:
          additionalProperties:
            type: string
          type: object
        createdAt:
          format: date-time
          type: string
        environmentId:
          type: integer
        id:
          description: UUID
          type: string
        isActive:
          type: boolean
        name:
          type: string
        providerId:
          type: integer
        successMessage:
          description: Present on create
          type: string
      title: OIDCRule
      type: object
    UserCreate:
      properties:
        email:
          format: email
          type: string
        name:
          type: string
        password:
          type: string
        role:
          enum:
            - super
            - regular
          type: string
      required:
        - name
        - email
        - role
      title: UserCreate
      type: object
    Project:
      properties:
        createdAt:
          format: date-time
          type: string
        description:
          type: string
        envCount:
          type: integer
        id:
          description: UUID
          type: string
        name:
          type: string
        slug:
          type: string
        team:
          description: First team (backwards compat)
          oneOf:
            - $ref: '#/components/schemas/ProjectTeamRef'
            - type: 'null'
        teams:
          items:
            $ref: '#/components/schemas/ProjectTeamRef'
          type: array
        updatedAt:
          format: date-time
          type: string
      title: Project
      type: object
    SettingsUpdate:
      properties:
        app_email:
          format: email
          type: string
        app_name:
          type: string
        app_url:
          type: string
      title: SettingsUpdate
      type: object
    ScimTokenCreated:
      description: Returned once on creation; the raw token cannot be re-fetched later.
      properties:
        description:
          type: string
        token:
          type: string
        uuid:
          type: string
      title: ScimTokenCreated
      type: object
    OIDCProviderCreate:
      properties:
        audience:
          type: string
        discovery_url:
          type: string
        name:
          type: string
      required:
        - name
        - discovery_url
        - audience
      title: OIDCProviderCreate
      type: object
    SnapshotCreate:
      properties:
        description:
          type: string
        record_type:
          enum:
            - project
            - environment
            - unit
          type: string
        record_uuid:
          type: string
        team_id:
          description: Team UUID
          type: string
        title:
          type: string
      required:
        - title
        - description
        - record_type
        - record_uuid
        - team_id
      title: SnapshotCreate
      type: object
    ScimToken:
      properties:
        createdAt:
          format: date-time
          type: string
        description:
          type: string
        id:
          type: string
      title: ScimToken
      type: object
    AuditEvent:
      properties:
        action:
          type: string
        actorId:
          nullable: true
          type: integer
        actorName:
          nullable: true
          type: string
        actorType:
          enum:
            - user
            - system
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: integer
        metadata:
          description: JSON-encoded metadata
          nullable: true
          type: string
        resourceId:
          nullable: true
          type: string
        resourceName:
          nullable: true
          type: string
        resourceType:
          type: string
      title: AuditEvent
      type: object
    Task:
      properties:
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        runAt:
          format: date-time
          type: string
        status:
          type: string
        updatedAt:
          format: date-time
          type: string
      title: Task
      type: object
    ApiKey:
      properties:
        apiKey:
          type: string
      title: ApiKey
      type: object
    ProjectList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        projects:
          items:
            $ref: '#/components/schemas/Project'
          type: array
      title: ProjectList
      type: object
    OIDCRuleCreate:
      properties:
        claim_rules:
          oneOf:
            - additionalProperties:
                type: string
              type: object
            - description: Pre-encoded JSON
              type: string
        environment_id:
          description: Environment UUID
          type: string
        name:
          type: string
        provider_id:
          description: Provider UUID
          type: string
        role_id:
          description: Role granted on match. Defaults to applier.
          type: integer
      required:
        - name
        - provider_id
        - environment_id
      title: OIDCRuleCreate
      type: object
    EnvironmentProjectRef:
      properties:
        id:
          description: Project UUID
          type: string
      title: EnvironmentProjectRef
      type: object
    ScimTokenList:
      properties:
        tokens:
          items:
            $ref: '#/components/schemas/ScimToken'
          type: array
      title: ScimTokenList
      type: object
    Team:
      properties:
        createdAt:
          format: date-time
          type: string
        description:
          type: string
        id:
          description: UUID
          type: string
        members:
          items:
            description: User UUID
            type: string
          type: array
        name:
          type: string
        projectsCount:
          type: integer
        slug:
          type: string
        updatedAt:
          format: date-time
          type: string
        usersCount:
          type: integer
      title: Team
      type: object
    Success:
      description: Generic success response
      properties:
        successMessage:
          type: string
      title: Success
      type: object
    ProjectTeamRef:
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      title: ProjectTeamRef
      type: object
    EnvironmentList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        environments:
          items:
            $ref: '#/components/schemas/Environment'
          type: array
      title: EnvironmentList
      type: object
    SnapshotList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        snapshots:
          items:
            $ref: '#/components/schemas/Snapshot'
          type: array
      title: SnapshotList
      type: object
    TeamCreate:
      properties:
        description:
          type: string
        members:
          items:
            description: User UUID
            type: string
          type: array
        name:
          type: string
        slug:
          type: string
      required:
        - name
        - slug
        - description
      title: TeamCreate
      type: object
    Error:
      description: Error response
      properties:
        errorMessage:
          type: string
      title: Error
      type: object
    EnvironmentCreate:
      properties:
        name:
          type: string
        secret:
          type: string
        slug:
          type: string
        username:
          type: string
      required:
        - name
        - slug
        - username
        - secret
      title: EnvironmentCreate
      type: object
    SnapshotUpdate:
      properties:
        description:
          type: string
        team_id:
          type: string
        title:
          type: string
      title: SnapshotUpdate
      type: object
    SsoSettingsUpdate:
      additionalProperties: true
      description: SSO + auth toggles. Field set is intentionally permissive — see config docs.
      properties:
        auth_password_enabled:
          type: boolean
        auth_sso_enabled:
          type: boolean
        scim_enabled:
          type: boolean
        sso_protocol:
          enum:
            - oidc
            - saml
          type: string
      title: SsoSettingsUpdate
      type: object
    SnapshotTeamRef:
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      title: SnapshotTeamRef
      type: object
    ListMetadata:
      properties:
        limit:
          type: integer
        offset:
          type: integer
        totalCount:
          type: integer
      title: ListMetadata
      type: object
    Snapshot:
      properties:
        createdAt:
          format: date-time
          type: string
        description:
          type: string
        id:
          description: UUID
          type: string
        record_type:
          enum:
            - project
            - environment
            - unit
          type: string
        record_uuid:
          type: string
        status:
          enum:
            - success
            - failure
            - pending
          type: string
        team:
          $ref: '#/components/schemas/SnapshotTeamRef'
        title:
          type: string
        updatedAt:
          format: date-time
          type: string
      title: Snapshot
      type: object
    OIDCRuleList:
      properties:
        rules:
          items:
            $ref: '#/components/schemas/OIDCRule'
          type: array
      title: OIDCRuleList
      type: object
    TeamList:
      properties:
        _metadata:
          $ref: '#/components/schemas/ListMetadata'
        teams:
          items:
            $ref: '#/components/schemas/Team'
          type: array
      title: TeamList
      type: object
    User:
      properties:
        authProvider:
          enum:
            - local
            - oidc
            - saml
            - scim
          type: string
        createdAt:
          format: date-time
          type: string
        email:
          format: email
          type: string
        id:
          description: UUID
          type: string
        isActive:
          type: boolean
        name:
          type: string
        role:
          enum:
            - super
            - regular
          type: string
        updatedAt:
          format: date-time
          type: string
      title: User
      type: object
  securitySchemes:
    api_key:
      description: Per-user API key from `/admin/profile`
      in: header
      name: x-api-key
      type: apiKey
info:
  contact:
    name: Muon Space
    url: https://github.com/Muon-Space/Lynx
  description: |
    Lynx is a self-hosted Terraform backend. The `/api/v1/*` REST API
    manages every resource (users, teams, projects, environments,
    snapshots, OIDC providers, audit log, settings).

    All endpoints require the `x-api-key` header — find your key on
    `/admin/profile`.

    `info.version` and the `x-server-version` response header both
    report the running app version (single source of truth: `mix.exs`
    `@version`, bumped by semantic-release).
  license:
    name: MIT
    url: https://github.com/Muon-Space/Lynx/blob/main/LICENSE
  title: Lynx
  version: 1.22.0
openapi: 3.0.0
paths:
  /api/v1/action/fetch_api_key:
    get:
      callbacks: {}
      operationId: LynxWeb.ProfileController.fetch_api_key
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: API key
      security:
        - api_key: []
      summary: Fetch the current user's API key
      tags:
        - Profile
  /api/v1/action/rotate_api_key:
    post:
      callbacks: {}
      operationId: LynxWeb.ProfileController.rotate_api_key
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: New API key
      security:
        - api_key: []
      summary: Rotate the current user's API key
      tags:
        - Profile
  /api/v1/action/saml_cert:
    post:
      callbacks: {}
      operationId: LynxWeb.SettingsController.generate_saml_cert
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamlCertResponse'
          description: Generated
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: Generate a SAML SP certificate (super only)
      tags:
        - Settings
  /api/v1/action/scim_token:
    post:
      callbacks: {}
      description: |
        The token value is returned **once** in this response. Subsequent
        list-token calls return the metadata only — lost tokens must be
        revoked and re-minted.
      operationId: LynxWeb.SettingsController.generate_scim_token
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScimTokenCreate'
        description: Token
        required: false
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimTokenCreated'
          description: Minted
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: Mint a new SCIM bearer token (super only)
      tags:
        - Settings
  /api/v1/action/scim_token/{uuid}:
    delete:
      callbacks: {}
      operationId: LynxWeb.SettingsController.revoke_scim_token
      parameters:
        - description: ''
          in: path
          name: uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Revoked
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
        - api_key: []
      summary: Revoke a SCIM token (super only)
      tags:
        - Settings
  /api/v1/action/scim_tokens:
    get:
      callbacks: {}
      operationId: LynxWeb.SettingsController.list_scim_tokens
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimTokenList'
          description: Tokens
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: List SCIM tokens (super only) — values masked
      tags:
        - Settings
  /api/v1/action/update_profile:
    post:
      callbacks: {}
      operationId: LynxWeb.ProfileController.update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
        description: Profile fields
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Updated
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
      security:
        - api_key: []
      summary: Update the current user's profile
      tags:
        - Profile
  /api/v1/action/update_settings:
    put:
      callbacks: {}
      operationId: LynxWeb.SettingsController.update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
        description: Settings
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Updated
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: Update general app settings (super only)
      tags:
        - Settings
  /api/v1/action/update_sso_settings:
    put:
      callbacks: {}
      operationId: LynxWeb.SettingsController.update_sso
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoSettingsUpdate'
        description: SSO settings
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Updated
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: Update SSO + auth settings (super only)
      tags:
        - Settings
  /api/v1/audit:
    get:
      callbacks: {}
      description: All filter params are optional and AND-combined.
      operationId: LynxWeb.AuditController.list
      parameters:
        - description: Exact action match
          in: query
          name: action
          required: false
          schema:
            type: string
        - description: Exact resource type match
          in: query
          name: resource_type
          required: false
          schema:
            type: string
        - description: Exact actor PK
          in: query
          name: actor_id
          required: false
          schema:
            type: integer
        - description: Default 50
          in: query
          name: limit
          required: false
          schema:
            type: integer
        - description: Default 0
          in: query
          name: offset
          required: false
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventList'
          description: Events
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: List audit events (super only)
      tags:
        - Audit
  /api/v1/environment/{e_uuid}/lock:
    post:
      callbacks: {}
      description: Requires `state:lock` on the env's project.
      operationId: LynxWeb.EnvironmentController.force_lock
      parameters:
        - description: Environment UUID
          in: path
          name: e_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Locked
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
        - api_key: []
      summary: Force-lock an environment
      tags:
        - Environments
  /api/v1/environment/{e_uuid}/unlock:
    post:
      callbacks: {}
      description: |
        Clears the active lock — the destructive variant. Requires
        `state:force_unlock` (admin only). Note that the routine post-apply
        unlock that Terraform calls automatically uses `/tf/.../unlock` and
        only requires `state:unlock`.
      operationId: LynxWeb.EnvironmentController.force_unlock
      parameters:
        - description: Environment UUID
          in: path
          name: e_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Unlocked
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
        - api_key: []
      summary: Force-unlock an environment (admin only)
      tags:
        - Environments
  /api/v1/oidc_provider:
    get:
      callbacks: {}
      operationId: LynxWeb.OIDCProviderController.list_providers
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCProviderList'
          description: Providers
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: List OIDC providers (super only)
      tags:
        - OIDC
    post:
      callbacks: {}
      operationId: LynxWeb.OIDCProviderController.create_provider
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCProviderCreate'
        description: Provider
        required: false
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCProvider'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
      security:
        - api_key: []
      summary: Create an OIDC provider (super only)
      tags:
        - OIDC
  /api/v1/oidc_provider/{uuid}:
    delete:
      callbacks: {}
      operationId: LynxWeb.OIDCProviderController.delete_provider
      parameters:
        - description: ''
          in: path
          name: uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Deleted
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
        - api_key: []
      summary: Delete an OIDC provider (super only)
      tags:
        - OIDC
    put:
      callbacks: {}
      operationId: LynxWeb.OIDCProviderController.update_provider
      parameters:
        - description: ''
          in: path
          name: uuid
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:

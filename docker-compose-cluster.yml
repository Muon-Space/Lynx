version: '3.8'

services:
  app1:
    image: ghcr.io/muon-space/lynx:latest
    environment:
      APP_NAME: Lynx
      APP_PORT: 4001
      APP_SECRET: koPmu7TJCwD8mttV9vgWUeU7iuu/zTPOR3sX4UalM9KkYEVGPfyi0PeTVzu1TT8C
      APP_HOST: localhost
      APP_HTTP_SCHEMA: http
      DB_USERNAME: root
      DB_PASSWORD: D1q9f0C2&PEW
      DB_HOSTNAME: db
      DB_DATABASE: lynx
      DB_PORT: 5432
      DB_SSL: null
      DB_CA_CERTFILE_PATH: null
      OPA_URL: http://opa:8181
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
      MIX_ENV: prod
    command: sh -c "/app/bin/migrate && /app/bin/server"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4001/_health"]
      interval: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      - db
      - opa

  app2:
    image: ghcr.io/muon-space/lynx:latest
    environment:
      APP_NAME: Lynx
      APP_PORT: 4002
      APP_SECRET: koPmu7TJCwD8mttV9vgWUeU7iuu/zTPOR3sX4UalM9KkYEVGPfyi0PeTVzu1TT8C
      APP_HOST: localhost
      APP_HTTP_SCHEMA: http
      DB_USERNAME: root
      DB_PASSWORD: D1q9f0C2&PEW
      DB_HOSTNAME: db
      DB_DATABASE: lynx
      DB_PORT: 5432
      DB_SSL: null
      DB_CA_CERTFILE_PATH: null
      OPA_URL: http://opa:8181
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
      MIX_ENV: prod
    command: sh -c "/app/bin/migrate && /app/bin/server"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4002/_health"]
      interval: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      - db
      - opa

  app3:
    image: ghcr.io/muon-space/lynx:latest
    environment:
      APP_NAME: Lynx
      APP_PORT: 4003
      APP_SECRET: koPmu7TJCwD8mttV9vgWUeU7iuu/zTPOR3sX4UalM9KkYEVGPfyi0PeTVzu1TT8C
      APP_HOST: localhost
      APP_HTTP_SCHEMA: http
      DB_USERNAME: root
      DB_PASSWORD: D1q9f0C2&PEW
      DB_HOSTNAME: db
      DB_DATABASE: lynx
      DB_PORT: 5432
      DB_SSL: null
      DB_CA_CERTFILE_PATH: null
      OPA_URL: http://opa:8181
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
      MIX_ENV: prod
    command: sh -c "/app/bin/migrate && /app/bin/server"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4003/_health"]
      interval: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      - db
      - opa

  db:
    image: postgres:18.3
    environment:
      POSTGRES_DB: lynx
      POSTGRES_USER: root
      POSTGRES_PASSWORD: D1q9f0C2&PEW
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql/data

  nginx:
    image: nginx:1.25.4-alpine3.18
    ports:
      - '80:80'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost/_health"]
      interval: 30s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./nginx-cluster.conf:/etc/nginx/nginx.conf
      - nginx_logs:/var/log/nginx

  opa:
    image: openpolicyagent/opa:latest
    environment:
      OPA_BUNDLE_TOKEN: ${OPA_BUNDLE_TOKEN:?OPA_BUNDLE_TOKEN must be set in .env}
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--config-file=/config/config.yaml"]
    restart: unless-stopped
    # Exposed on the host for debugging only; the lynx replicas talk to opa
    # over the compose network at http://opa:8181. OPA itself polls bundles
    # from http://nginx:80 so the load balancer fans the polling out across
    # app1/app2/app3.
    ports:
      - '8181:8181'
    volumes:
      - ./opa-config-cluster.yaml:/config/config.yaml:ro
    depends_on:
      - nginx

volumes:
  db:
    driver: local
  nginx_logs:
    driver: local
